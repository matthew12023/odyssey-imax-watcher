name: Odyssey IMAX Watcher

on:
  schedule:
    # Every 5 minutes. GitHub may delay this slightly at busy times — that's normal.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you click "Run workflow" manually to test

permissions:
  contents: write   # needed so the job can save its "last seen" snapshot back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install headless Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        env:
          TARGET_URL: ${{ vars.TARGET_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: node watch.js

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug.png
          if-no-files-found: ignore
          retention-days: 3

      - name: Save updated snapshot
        run: |
          git config user.name "odyssey-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update snapshot"
          git push
